volumes:
  rustnzb-config:
  rustnzb-data:
  rustnzb-downloads:

services:
  rustnzb:
    profiles: [direct]
    image: ghcr.io/${RUSTNZB_GHCR_OWNER:-REPLACE_ME}/${RUSTNZB_IMAGE_NAME:-rustnzb-restyle}:latest
    container_name: rustnzb
    restart: unless-stopped
    ports:
      - "9095:9090"
    volumes:
      - rustnzb-config:/config
      - rustnzb-data:/data
      - rustnzb-downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Sydney
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gluetun:
    profiles: [vpn]
    image: qmcgaw/gluetun:latest
    container_name: rustnzb-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "9095:9090"
    environment:
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: ${RUSTNZB_VPN_TRANSPORT:-wireguard}
      SERVER_COUNTRIES: ${RUSTNZB_VPN_PROFILE:-NL}
      FIREWALL: "on"
      # Secrets only through ENV variables:
      # - Proton OpenVPN: OPENVPN_USER / OPENVPN_PASSWORD
      # - Proton WireGuard: WIREGUARD_PRIVATE_KEY / WIREGUARD_ADDRESSES
    volumes:
      - rustnzb-config:/config

  rustnzb-vpn:
    profiles: [vpn]
    image: ghcr.io/${RUSTNZB_GHCR_OWNER:-REPLACE_ME}/${RUSTNZB_IMAGE_NAME:-rustnzb-restyle}:latest
    container_name: rustnzb
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - rustnzb-config:/config
      - rustnzb-data:/data
      - rustnzb-downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Australia/Sydney
      - RUST_LOG=info
      - RUSTNZB_VPN_ENABLED=true
      - RUSTNZB_VPN_PROVIDER=protonvpn
      - RUSTNZB_VPN_TRANSPORT=${RUSTNZB_VPN_TRANSPORT:-wireguard}
      - RUSTNZB_VPN_PROFILE=${RUSTNZB_VPN_PROFILE:-nl}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  promtail:
    image: grafana/promtail:3.6.10
    profiles: [logging]
    network_mode: host
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    environment:
      LOKI_URL: ${LOKI_URL}
      HOSTNAME: ${HOSTNAME:-rustnzb}
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    restart: unless-stopped
